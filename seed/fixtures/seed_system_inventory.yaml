- key: contract_review_agent
  slug: contract-review-agent
  name: Contract Review Agent
  owner_team: Legal Operations
  business_owner: legal-ops-director
  technical_owner: ai-platform-team
  intended_purpose: Reviews inbound vendor contract text and flags high-risk clauses.
  deployment_context: Internal enterprise workflow
  environment: production
  risk_tier: elevated
  classification_profile: legal_assist_internal
  linked_policy_packs:
    - high_risk_use_case_review
    - memory_privacy_retention
    - human_approval_escalation
    - auditability_assurance_recordkeeping
  required_review_path: enhanced_review
  recertification_interval_days: 90
  notes:
    - Handles potentially sensitive legal data
    - Escalates to a human reviewer for high-impact outputs
